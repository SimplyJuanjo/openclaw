services:
  openclaw-gateway:
    group_add:
      - "${DOCKER_SOCK_GID:-988}"
    environment:
      GH_TOKEN: ${GH_TOKEN}
      XDG_CONFIG_HOME: /home/node/.openclaw
      PATH: /opt/host-tools/npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - /mnt/openclaw/host-tools/npm-global:/opt/host-tools/npm-global
      - /mnt/openclaw/host-tools/npm-global/bin/gog:/usr/local/bin/gog:ro
      - /mnt/openclaw/host-tools/codex-home:/home/node/.codex
      - /mnt/openclaw/host-tools/ops:/opt/host-tools/ops
      - /mnt/openclaw/host-tools/runs:/opt/host-tools/runs
      - /opt/openclaw:/opt/openclaw-host
      - /usr/bin/docker:/usr/local/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host:ro

  openclaw-cli:
    group_add:
      - "${DOCKER_SOCK_GID:-988}"
    environment:
      GH_TOKEN: ${GH_TOKEN}
      XDG_CONFIG_HOME: /home/node/.openclaw
      PATH: /opt/host-tools/npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - /mnt/openclaw/host-tools/npm-global:/opt/host-tools/npm-global
      - /mnt/openclaw/host-tools/npm-global/bin/gog:/usr/local/bin/gog:ro
      - /mnt/openclaw/host-tools/codex-home:/home/node/.codex
      - /mnt/openclaw/host-tools/ops:/opt/host-tools/ops
      - /mnt/openclaw/host-tools/runs:/opt/host-tools/runs
      - /opt/openclaw:/opt/openclaw-host
      - /usr/bin/docker:/usr/local/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host:ro
